<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Matemática - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #25478a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        h2 { color: #1e3a8a; margin-bottom: 8px; font-size: 28px; }
        p { color: #64748b; margin-bottom: 24px; font-size: 14px; }
        input { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #25478a; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px; margin-bottom: 16px; }
        button:hover { background: #1e3a8a; }
        .toggle-link { color: #25478a; text-decoration: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="titulo">Bem-vindo</h2>
        <p id="subtitulo">Acesse sua conta para praticar matemática</p>
        <form id="authForm" action="/login" method="POST">
            <input type="text" name="usuario" placeholder="Seu usuário" required>
            <input type="password" name="senha" placeholder="Sua senha" required>
            <button type="submit" id="btnAcao">Entrar na Plataforma</button>
        </form>
        <span id="footerText">Não tem uma conta? <a class="toggle-link" onclick="alternarModo()">Cadastre-se</a></span>
    </div>

    <script>
        let modoCadastro = false;
        function alternarModo() {
            modoCadastro = !modoCadastro;
            const form = document.getElementById('authForm');
            document.getElementById('titulo').innerText = modoCadastro ? 'Criar Conta' : 'Bem-vindo';
            document.getElementById('subtitulo').innerText = modoCadastro ? 'Cadastre-se para iniciar seus estudos' : 'Acesse sua conta para praticar matemática';
            document.getElementById('btnAcao').innerText = modoCadastro ? 'Cadastrar Conta' : 'Entrar na Plataforma';
            form.action = modoCadastro ? '/cadastrar' : '/login';
            document.getElementById('footerText').innerHTML = modoCadastro ? 'Já tem conta? <a class="toggle-link" onclick="alternarModo()">Fazer Login</a>' : 'Não tem uma conta? <a class="toggle-link" onclick="alternarModo()">Cadastre-se</a>';
        }
    </script>
</body>
</html>
